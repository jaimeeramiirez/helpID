<svg width="480" height="820" viewBox="0 0 480 820" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  .bracelet { animation: float 4s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  .glow-ring { animation: glow-p 2.5s ease-in-out infinite; }
  @keyframes glow-p { 0%,100%{opacity:.07} 50%{opacity:.28} }
  .ray-c { animation: ray-a 2.5s ease-in-out infinite; }
  .ray-l { animation: ray-a 2.5s ease-in-out infinite; animation-delay:.7s; }
  .ray-r { animation: ray-a 2.5s ease-in-out infinite; animation-delay:1.3s; }
  @keyframes ray-a { 0%,100%{opacity:.2} 50%{opacity:.92} }
  .core  { animation: core-g 2.5s ease-in-out infinite; }
  @keyframes core-g { 0%,100%{filter:drop-shadow(0 0 5px #38B2D6)} 50%{filter:drop-shadow(0 0 18px #38B2D6)} }
  .scan  { animation: scan-a 3.2s ease-in-out infinite; }
  @keyframes scan-a { 0%{transform:translateY(-30px);opacity:0} 10%{opacity:.6} 90%{opacity:.6} 100%{transform:translateY(30px);opacity:0} }
</style>
<defs>
  <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#D4E4F4"/>
  </linearGradient>
  <linearGradient id="lgd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#FAFAFF"/>
    <stop offset="100%" stop-color="#C4D4E8"/>
  </linearGradient>
  <linearGradient id="case-g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#1A3C64"/>
    <stop offset="100%" stop-color="#061422"/>
  </linearGradient>
  <linearGradient id="disc-g" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#4EC8E8"/>
    <stop offset="100%" stop-color="#2490B8"/>
  </linearGradient>
  <radialGradient id="glow-bg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#38B2D6" stop-opacity="1"/>
    <stop offset="100%" stop-color="#38B2D6" stop-opacity="0"/>
  </radialGradient>
  <filter id="sf" x="-20%" y="-10%" width="140%" height="130%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0D2B4A" flood-opacity="0.22"/>
  </filter>
  <filter id="cf" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0A1E36" flood-opacity="0.5"/>
  </filter>
  <clipPath id="disc-clip">
    <circle cx="240" cy="395" r="46"/>
  </clipPath>
</defs>

<!-- ──────────── ALL ELEMENTS FLOAT TOGETHER ──────────── -->
<g class="bracelet">

<!-- AMBIENT GLOW RING BEHIND DISC -->
<ellipse class="glow-ring" cx="240" cy="395" rx="110" ry="90" fill="url(#glow-bg)"/>

<!-- ──── LIGHT RAYS (above disc) ──── -->
<line class="ray-c" x1="240" y1="348" x2="240" y2="305" stroke="#38B2D6" stroke-width="4" stroke-linecap="round"/>
<line class="ray-l" x1="221" y1="358" x2="198" y2="328" stroke="#38B2D6" stroke-width="2.8" stroke-linecap="round"/>
<line class="ray-r" x1="259" y1="358" x2="282" y2="328" stroke="#38B2D6" stroke-width="2.8" stroke-linecap="round"/>

<!-- ──── TOP STRAP CAP ──── -->
<rect x="219" y="55" width="42" height="15" rx="7.5" fill="url(#lgd)" stroke="#B8CCD8" stroke-width="0.8" filter="url(#sf)"/>

