<!-- Disc surface highlight -->
<ellipse cx="232" cy="378" rx="18" ry="12" fill="rgba(255,255,255,0.15)" transform="rotate(-15,232,378)"/>

<!-- QR PATTERN (Faro icon adapted) -->
